---

variables:

-   name: app_name
    prompt: App Name
    default: myapp

-   name: feature1
    type: boolean
    default: true
    extend:
        -   when: true
            variables:
                -   name: feature1_var
                    prompt: Feature1 Variable
                    default: feature1_val
            ignore:
                - '.*no-feature1.*'
        -   when: false
            exclude:
                - '.*feature1-file.*'
            ignore:
                - '.*feature1-only.*'

-   name: feature2
    type: boolean
    default: false
    extend:
        -   when: true
            variables:
                -   name: feature2_var
                    prompt: Feature2 Variable
                    default: feature2_val
        -   when: false
            ignore:
                - '.*feature2-only.*'
                - '.*feature2-file.*'
