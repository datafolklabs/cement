---

variables:
    -   name: app_name
        prompt: App Name
        default: myapp

    -   name: bool_prereq
        type: boolean
        default: false

    -   name: select_dependent
        type: choice
        prompt: "Dependent"
        default: "X"
        options: ["X"]
        requires:
            - bool_prereq
        extend:
            -   when: "X"
                ignore:
                    - '.*should-not-appear.*'
