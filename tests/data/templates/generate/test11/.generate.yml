---

variables:

-   name: app_name
    prompt: App Name
    default: myapp

-   name: feature1
    type: boolean
    default: false
    extend:
        -   when: false
            ignore:
                - '.*feature1-only.*'

-   name: feature2
    type: boolean
    default: true
    requires:
        - feature1
    extend:
        -   when: true
            ignore:
                - '.*feature2-only.*'
