---

# Transitive requires: feature1 (false) gates feature2, which gates
# feature3. Each gated-out variable renders as its own `default` (Q1).
# feature2/feature3 default to false so the cascade propagates: a
# gated-out var's resolved value is its default, and a falsy default
# means downstream `requires` against it also fail.

variables:

-   name: app_name
    prompt: App Name
    default: myapp

-   name: feature1
    type: boolean
    default: false
    extend:
        -   when: false
            ignore:
                - '.*feature1-only.*'

-   name: feature2
    type: boolean
    default: false
    requires:
        - feature1
    extend:
        -   when: true
            ignore:
                - '.*feature2-only.*'

-   name: feature3
    type: boolean
    default: false
    requires:
        - feature2
    extend:
        -   when: true
            ignore:
                - '.*feature3-only.*'
