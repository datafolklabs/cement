---

variables:

-   name: app_name
    prompt: App Name
    default: myapp

-   name: feature_choice
    type: choice
    prompt: "Pick a version"
    default: "1"
    options: ["1", "2"]
    extend:
        -   when: "1"
            variables:
                -   name: chosen_version
                    prompt: false
                    default: "v1-silent"
        -   when: "2"
            variables:
                -   name: chosen_version
                    prompt: false
                    default: "v2-silent"
