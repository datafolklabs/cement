---

# Out-of-order requires: feature_b requires feature_a, but feature_b is
# declared FIRST in the YAML. Both default to true. The lazy recursive
# resolver resolves feature_a on demand when feature_b's requires gate is
# checked, so resolution is order-independent and both stay enabled.

variables:

-   name: app_name
    prompt: App Name
    default: myapp

-   name: feature_b
    type: boolean
    default: true
    requires:
        - feature_a
    extend:
        -   when: false
            ignore:
                - '.*feature_b-only.*'

-   name: feature_a
    type: boolean
    default: true
    extend:
        -   when: false
            ignore:
                - '.*feature_a-only.*'
