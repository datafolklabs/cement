---

variables:
    -   name: project_name
        prompt: "Project Name"
        default: "myproject"
        case: lower

    -   name: docker
        type: boolean
        default: true
        extend:
            -   when: true
                variables:
                    -   name: python_version
                        prompt: "Python Version (for Docker)"
                        default: "3.13"
            -   when: false
                ignore:
                    - '.*Dockerfile.*'
                    - '.*\.dockerignore.*'

    -   name: docker_compose
        type: boolean
        default: true
        requires:
            - docker
        extend:
            -   when: false
                ignore:
                    - '.*docker-compose.*'

    -   name: web_framework
        type: choice
        prompt: "Web Framework"
        default: "none"
        options:
            -   value: "none"
                prompt: "None — no web framework"
            -   value: "flask"
                prompt: "Flask Web Framework"
            -   value: "fastapi"
                prompt: "FastAPI Web Framework"
        extend:
            -   when: "none"
                ignore:
                    - '.*requirements\.txt.*'
                    - '.*wsgi\.py.*'
            -   when: "flask"
                variables:
                    -   name: framework_version
                        prompt: false
                        default: "3.0"
                ignore:
                    - '.*fastapi.*'
            -   when: "fastapi"
                variables:
                    -   name: framework_version
                        prompt: false
                        default: "0.115"
                ignore:
                    - '.*flask.*'
