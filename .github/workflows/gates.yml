name: Gates

on:
  workflow_call:
    inputs:
      full-os-matrix:
        type: boolean
        default: true   # release always true; PR true per D-14

env:
  SMTP_HOST: localhost
  SMTP_PORT: 1025
  MEMCACHED_HOST: localhost
  REDIS_HOST: localhost

jobs:
  comply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ConorMacBride/install-package@v1.1.0
        with:
          apt: libmemcached-dev
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.x"
          architecture: "x64"
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4.5
      - name: Install dependencies
        run: pdm install
      - name: Make Comply
        run: make comply

  test:
    needs: comply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ConorMacBride/install-package@v1.1.0
        with:
          apt: libmemcached-dev
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.x"
          architecture: "x64"
      - uses: hoverkraft-tech/compose-action@v3.0.0
        with:
          compose-file: "./docker/compose-services-only.yml"
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4.5
      - name: Install dependencies
        run: pdm install
      - name: Make Test
        run: make test

  test-all:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.10", "pypy3.11"]

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ConorMacBride/install-package@v1.1.0
        with:
          apt: libmemcached-dev
      - uses: hoverkraft-tech/compose-action@v3.0.0
        with:
          compose-file: "./docker/compose-services-only.yml"
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4.5
      - name: Install dependencies
        run: pdm install
      - name: Make Test
        run: make test

  cli-smoke-test:
    needs: test-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: hoverkraft-tech/compose-action@v3.0.0
        with:
          compose-file: "./docker-compose.yml"
      - name: CLI Smoke Tests
        run: ./scripts/cli-smoke-test.sh
      - if: always()
        name: Review Output
        run: cat ./tmp/cli-smoke-test.out

  test-core-windows:
    if: ${{ inputs.full-os-matrix }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.x"
      # NOT `pdm install`: pdm.lock selects all extras, including pylibmc,
      # which needs libmemcached headers and cannot build on Windows/macOS.
      # tests/core skips the memcached/redis/alarm/daemon extensions on
      # Windows, so only these extras are required.
      - name: Install cement + core test deps (no service extras)
        run: python -m pip install ".[cli,colorlog,mustache,tabulate,watchdog]" pytest mock
      # addopts override: the repo-level addopts appends `tests/` (the full
      # suite — needs docker services) and `--cov-fail-under=100` (a
      # whole-suite gate). Keep `--capture=sys` — test_quiet closes streams
      # and fd-capture breaks without it. Coverage is enforced by the Linux
      # full-suite gate, not here.
      - name: Core Tests (Windows, no docker services)
        shell: bash
        run: python -m pytest -o addopts="--capture=sys" tests/core

  cli-smoke-native:
    if: ${{ inputs.full-os-matrix }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      # The smoke script resolves the `cement` console script from PATH and
      # generates+installs a project with pip — it never touches dist/ or a
      # PDM venv. A plain pip install of the [cli] extra is the entire
      # environment it needs (and avoids pdm.lock's all-extras selection,
      # which cannot build pylibmc on these runners).
      - name: Install cement[cli]
        run: python -m pip install ".[cli]"
      - name: Native CLI Smoke
        run: python scripts/cli-smoke-native.py
